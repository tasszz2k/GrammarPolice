name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.release-post-merge.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || steps.release-post-merge.outputs.tag_name }}
      version: ${{ steps.release.outputs.version || steps.release-post-merge.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge release PR
        if: steps.release.outputs.prs_created == 'true' && steps.release.outputs.releases_created != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --repo "${{ github.repository }}" --state open --json number,headRefName \
            -q '[.[] | select(.headRefName | startswith("release-please--branches--main"))][0].number')
          if [ -n "$PR" ]; then
            gh pr merge "$PR" --squash --repo "${{ github.repository }}"
          fi

      - uses: googleapis/release-please-action@v4
        id: release-post-merge
        if: steps.release.outputs.prs_created == 'true' && steps.release.outputs.releases_created != 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Release
        run: |
          xcodebuild -project GrammarPolice.xcodeproj \
            -scheme GrammarPolice \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create App Bundle
        run: |
          mkdir -p build/export
          cp -R build/DerivedData/Build/Products/Release/GrammarPolice.app build/export/

      - name: Create ZIP
        run: |
          cd build/export
          zip -r ../../GrammarPolice.zip GrammarPolice.app

      - name: Calculate SHA256
        id: sha256
        run: |
          SHA256=$(shasum -a 256 GrammarPolice.zip | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrammarPolice
          path: GrammarPolice.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: GrammarPolice.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew Tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping Homebrew update"
            exit 0
          fi

          VERSION="${{ needs.release-please.outputs.version }}"

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/tasszz2k/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          # Download the release zip and calculate SHA256
          curl -sSL -o GrammarPolice.zip "https://github.com/tasszz2k/GrammarPolice/releases/download/v${VERSION}/GrammarPolice.zip"
          SHA256=$(shasum -a 256 GrammarPolice.zip | awk '{print $1}')
          echo "SHA256: $SHA256"
          rm GrammarPolice.zip

          mkdir -p Casks

          cat > Casks/grammar-police.rb << EOF
          cask "grammar-police" do
            version "$VERSION"
            sha256 "$SHA256"

            url "https://github.com/tasszz2k/GrammarPolice/releases/download/v#{version}/GrammarPolice.zip"
            name "GrammarPolice"
            desc "AI-powered menubar app for grammar correction and translation on macOS"
            homepage "https://github.com/tasszz2k/GrammarPolice"

            depends_on macos: ">= :sonoma"

            app "GrammarPolice.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/GrammarPolice.app"],
                             sudo: false
            end

            zap trash: [
              "~/Library/Application Support/GrammarPolice",
              "~/Library/Caches/com.tasszz2k.GrammarPolice",
              "~/Library/Preferences/com.tasszz2k.GrammarPolice.plist",
              "~/Library/Logs/GrammarPolice",
            ]

            caveats <<~EOS
              GrammarPolice requires the following permissions:
              - Accessibility: System Settings > Privacy & Security > Accessibility
              - Input Monitoring: System Settings > Privacy & Security > Input Monitoring

              Configure your OpenAI API key or local LLM in Preferences after installation.

              Note: This app is not code-signed. If you see "app is damaged" error, run:
                xattr -cr /Applications/GrammarPolice.app
            EOS
          end
          EOF

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Casks/grammar-police.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update GrammarPolice to v$VERSION"
          git push

          echo "Homebrew tap updated successfully!"
