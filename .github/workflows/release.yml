name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.release-post-merge.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || steps.release-post-merge.outputs.tag_name }}
      version: ${{ steps.release.outputs.version || steps.release-post-merge.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge release PR
        if: steps.release.outputs.prs_created == 'true' && steps.release.outputs.releases_created != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --repo "${{ github.repository }}" --state open --json number,headRefName \
            -q '[.[] | select(.headRefName | startswith("release-please--branches--main"))][0].number')
          if [ -n "$PR" ]; then
            gh pr merge "$PR" --squash --repo "${{ github.repository }}"
          fi

      - uses: googleapis/release-please-action@v4
        id: release-post-merge
        if: steps.release.outputs.prs_created == 'true' && steps.release.outputs.releases_created != 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Release
        run: |
          xcodebuild -project GrammarPolice.xcodeproj \
            -scheme GrammarPolice \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create App Bundle
        run: |
          mkdir -p build/export
          cp -R build/DerivedData/Build/Products/Release/GrammarPolice.app build/export/

      - name: Create ZIP
        run: |
          cd build/export
          zip -r ../../GrammarPolice.zip GrammarPolice.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrammarPolice
          path: GrammarPolice.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: GrammarPolice.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
