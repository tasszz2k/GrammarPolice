name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.release-post-merge.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || steps.release-post-merge.outputs.tag_name }}
      version: ${{ steps.release.outputs.version || steps.release-post-merge.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge release PR
        if: steps.release.outputs.prs_created == 'true' && steps.release.outputs.releases_created != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --repo "${{ github.repository }}" --state open --json number,headRefName \
            -q '[.[] | select(.headRefName | startswith("release-please--branches--main"))][0].number')
          if [ -n "$PR" ]; then
            gh pr merge "$PR" --squash --repo "${{ github.repository }}"
          fi

      - uses: googleapis/release-please-action@v4
        id: release-post-merge
        if: steps.release.outputs.prs_created == 'true' && steps.release.outputs.releases_created != 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import signing cert
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${CERT_BASE64}" ]; then
            echo "MACOS_CERT_P12_BASE64 secret is not set."
            echo "Run scripts/generate-signing-cert.sh once and add the secrets in repo settings."
            exit 1
          fi
          CERT_PATH="${RUNNER_TEMP}/gp.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"

          # Sizes only (never print secret values)
          echo "CERT_BASE64 length: ${#CERT_BASE64}"
          echo "CERT_PASSWORD length: ${#CERT_PASSWORD}"
          printf '%s' "${CERT_BASE64}" | base64 --decode > "${CERT_PATH}"
          echo "Decoded p12 size: $(wc -c < "${CERT_PATH}") bytes"
          echo "Decoded p12 sha256: $(shasum -a 256 "${CERT_PATH}" | awk '{print $1}')"

          # NOTE: the p12 is generated with `openssl pkcs12 -export -legacy`
          # (pbeWithSHA1And40BitRC2-CBC + HMAC-SHA-1) so that the macOS
          # `security` command can decrypt it. OpenSSL 3.x's default
          # PBES2/AES-256/HMAC-SHA-256 format is rejected by `security
          # import` with a misleading "MAC verification failed". Do not
          # change the helper script to drop -legacy.

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -P "${CERT_PASSWORD}" \
            -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s "${KEYCHAIN_PATH}" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}" >/dev/null

          # `find-identity -p codesigning` reports 0 valid identities for
          # self-signed certs because they are not trusted by the system
          # codesigning policy. That is expected and harmless: codesign
          # below finds the identity by name in the keychain search list.
          security find-identity -v "${KEYCHAIN_PATH}" || true
          rm -f "${CERT_PATH}"

      - name: Build Release (unsigned)
        run: |
          xcodebuild -project GrammarPolice.xcodeproj \
            -scheme GrammarPolice \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION=${{ needs.release-please.outputs.version }} \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            build

      - name: Sign app with stable self-signed cert
        run: |
          set -euo pipefail
          APP=build/DerivedData/Build/Products/Release/GrammarPolice.app
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          codesign --force --deep --options runtime \
            --identifier com.tasszz2k.GrammarPolice \
            --sign "GrammarPolice Self-Signed" \
            --keychain "${KEYCHAIN_PATH}" \
            --entitlements GrammarPolice/GrammarPolice.entitlements \
            --timestamp=none \
            "${APP}"
          codesign --verify --verbose=4 "${APP}"
          codesign -dvvv "${APP}"
          codesign -d -r- "${APP}"

      - name: Create App Bundle
        run: |
          mkdir -p build/export
          cp -R build/DerivedData/Build/Products/Release/GrammarPolice.app build/export/

      - name: Create ZIP
        run: |
          cd build/export
          zip -r ../../GrammarPolice.zip GrammarPolice.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrammarPolice
          path: GrammarPolice.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: GrammarPolice.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
